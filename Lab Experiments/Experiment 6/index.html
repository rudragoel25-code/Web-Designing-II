<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <title>Experiment 6 - DOM Manipulation and Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <h1 id="heading">Welcome to JavaScript DOM</h1> 
    <p id="para">This is a sample paragraph for DOM manipulation.</p> 
    <input type="text" id="textInput" placeholder="Enter new heading text"> 
    <br> 
    <button id="changeTextBtn">Change Heading</button> 
    <button id="bgColorBtn">Change Background Color</button> 
    <button id="fontSizeBtn">Increase Font Size</button> 
    <button id="toggleParaBtn">Show/Hide Paragraph</button> 
    <button id="resetBtn">Reset</button> 
 
    <script src="main.js" defer></script> 
</body> 
</html>
