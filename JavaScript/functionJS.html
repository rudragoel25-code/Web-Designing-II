<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Function in JS</title>
  </head>
  <body>
    <script>
      //function: block of code used or defined to perform specific task
      //types of function
      //normal function: with para, without para & with default

      //normal function without parameters..

      function demo() {
        console.log("Hello JS");
      }
      demo(); //function calling

      // with parameters

      function demo1(text) {
        console.log("Hello" + text);
      }
      demo1("React");

      // default parameters

      function add(a, b = 10) {
        console.log("Addition is " + (a + b));
      }
      add(123);

      //synchronous
      function cal() {
        function add(a, b) {
          console.log(a + b);
        }
        function mul(p, r) {
          console.log(p * r);
        }
        function sub(p, r) {
          console.log(p - r);
        }
        add(3, 6);
        mul(7, 8);
        sub(5, 9);
      }
      cal();

      //anonymous function:- An anonymous function in JavaScript is a function that does not have an identifier (name) associated with it. They are primarily defined using function expressions or, more commonly, the concise ES6 arrow function syntax.

      let msg = function () {
        console.log("Hello ABES");
        // console.log(typeOf(msg));
      };
      msg();
      // short code for above function i.e. arrow function
      let msg1 = () => console.log("Hello ABESSSSS EC");
      msg1();
      // arrow function using multiple lines

      let msg2 = (a, b) => {
        var num1 = a;
        var num2 = b;
        var res = num1 / num2;
        console.log("Result is " + res);
      };
      msg2(10, 20);

      //IIFE:-
      (function () {
        console.log("Hello World!");
      })();
      //short code for above function
      ((msg) => console.log("hello"))();

      //promises, states, pending, fulfilled, rejected,

      let myPromoise = new Promise(function (resolve, reject) {
        let age = 25;
        if (age >= 18) {
          resolve("valid age");
        } else {
          reject("wait for next year");
        }
      });
      myPromoise
        .then()
        .catch((error) => console.log(msg))
        .catch((error) => console.log(error));
      console.log(myPromoise);

      //async and await are moder JavaScript

      //api... https://dummyjson.com/docs/products

      async function userInfo() {
        try {
          let userData = await fetch(
            "https://api.github.com/users/rudragoel25-code",
          );
          let response = await userData.json();
          console.log(response);
        } catch (error) {
          //try end
          console.log(error);
        } //catch end
      } //function end
      userInfo();

      //Higher order function:-
      //map filter reduce forEach

      let num = [4, 5, 6, 7, 8, 9, 3, 2, 1];

      //map
      let square = num.map((n) => n * n);
      console.log(square);
      //reduce
      let sum = num.reduce((total, n) => total + n);
      console.log(sum);
      //filter
      let sorting = num.filter((n) => n > 2);
      console.log(sorting);
      //forEach
      num.forEach((n) => console.log(n * 2));

     // local storage:- 
     let myInfo={
      
     }

    </script>
  </body>
</html>
